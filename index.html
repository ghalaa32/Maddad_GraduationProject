<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | MADDAD</title>

  <!-- ربط ملف الستايل -->
  <link rel="stylesheet" href="pages/style.css" />

</head>

<body class="landing-body">

  <div class="landing-page-wrap">

    <div class="landing-main-card">

      <!-- الشعار -->
      <img src="pictures/logo.png" class="landing-logo" alt="شعار مدد" />

      <!-- العنوان -->
      <h1 class="landing-title">مرحباً بكم في تطبيق مدد</h1>

      <!-- النص -->
      <p class="landing-text">
        هلا والله! مع مدد نساعدك تتابع نمو طفلكم ونكتشف احتياجاته خطوة بخطوة.
      </p>

      <!-- الأزرار -->
      <div class="landing-role-grid">

        <button class="landing-role-card parent-card" onclick="goParent()">
          <div class="landing-role-text">
            <h3>ولي الأمر</h3>
            <p>الدخول لإدارة الحساب والاستبيان</p>
          </div>
        </button>

        <button class="landing-role-card child-card" onclick="goChild()">
          <div class="landing-role-text">
            <h3>الطفل</h3>
            <p>الدخول إلى صفحة الألعاب</p>
          </div>
        </button>

      </div>

    </div>

  </div>

  <!-- نموذج إنشاء حساب -->
  <div class="landing-page-wrap" id="registerSection" style="display:none;">
    <div class="landing-main-card">
      <h2 class="landing-title">إنشاء حساب جديد</h2>
      <form id="registerForm">
        <input type="text" id="username" placeholder="اسم المستخدم" required style="display:block;width:100%;margin-bottom:10px;padding:8px;border-radius:8px;border:1px solid #ccc;" />
        <input type="text" id="fullName" placeholder="الاسم الكامل" required style="display:block;width:100%;margin-bottom:10px;padding:8px;border-radius:8px;border:1px solid #ccc;" />
        <input type="email" id="email" placeholder="البريد الإلكتروني" required style="display:block;width:100%;margin-bottom:10px;padding:8px;border-radius:8px;border:1px solid #ccc;" />
        <input type="tel" id="phone" placeholder="رقم الجوال (اختياري)" style="display:block;width:100%;margin-bottom:10px;padding:8px;border-radius:8px;border:1px solid #ccc;" />
        <input type="password" id="password" placeholder="كلمة المرور" required style="display:block;width:100%;margin-bottom:10px;padding:8px;border-radius:8px;border:1px solid #ccc;" />
        <button type="button" onclick="handleRegister()" class="landing-role-card parent-card" style="width:100%;margin-bottom:8px;">إنشاء حساب</button>
        <button type="button" onclick="document.getElementById('registerSection').style.display='none';document.querySelector('.landing-page-wrap').style.display='flex';" class="landing-role-card child-card" style="width:100%;">رجوع</button>
      </form>
    </div>
  </div>

  <!-- ربط الجافاسكربت -->
  <script src="pages/script.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function handleRegister() {
      var formData = {
        username: document.getElementById('username').value,
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value
      };
      registerAccount(formData);
    }
  </script>

</body>
</html>
