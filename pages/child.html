<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | صفحة الطفل</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="child-games-body" onload="loadChildGamesPage()">

  <div class="child-games-shell">

    <!-- Top Bar -->
    <header class="child-games-topbar">
      <button class="child-games-logout-btn" onclick="logout()" aria-label="تسجيل الخروج">⎋</button>
      <img src="../pictures/logo.png" class="child-games-top-logo" alt="شعار مدد" />
    </header>

    <!-- Main -->
    <main class="child-games-main-wrap">
      <section class="child-games-main-card">

        <h1 class="child-games-title">الألعاب</h1>

        <div class="child-games-tabs">
          <button class="child-games-tab active" onclick="setChildGamesFilter('all', this)">الألعاب</button>
          <button class="child-games-tab" onclick="setChildGamesFilter('growth', this)">نقاط النمو</button>
        </div>

        <div class="child-games-scroll-box">
          <div id="childGamesGrid" class="child-games-grid"></div>
        </div>

      </section>
    </main>

  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
