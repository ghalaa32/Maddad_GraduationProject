<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | الأداء</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-body" onload="loadDashboardPage()">
  <div class="dashboard-shell">

    <header class="dashboard-topbar">
      <img src="../pictures/logo.png" class="dashboard-logo" alt="شعار مدد"
        onclick="window.location.href='home-login.html'" style="cursor:pointer;" />
      <div class="dashboard-actions">
        <button class="icon-box-btn" onclick="goBackHome()" aria-label="العودة" title="العودة">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <button class="icon-box-btn" onclick="logout()" aria-label="تسجيل الخروج" title="تسجيل الخروج">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="dashboard-main">

      <section class="dashboard-card main-card">
        <img id="riskImage" class="risk-image" alt="حالة التقييم الحالية" />
        <div class="dashboard-hero-text">
          <h2 id="riskTitle">-</h2>
          <p id="riskDesc">-</p>
        </div>
      </section>

      <section class="dashboard-stats">
        <div class="stat-box">
          <span>عدد المهارات</span>
          <h3 id="skillsCount">0</h3>
        </div>
        <div class="stat-box">
          <span>آخر سكور</span>
          <h3 id="lastScore">0</h3>
        </div>
        <div class="stat-box">
          <span>عدد التقييمات</span>
          <h3 id="historyCount">0</h3>
        </div>
      </section>

      <section class="dashboard-card dashboard-chart-card">
        <h3>تطور الحالة</h3>
        <div class="dashboard-chart-wrap">
          <canvas id="progressChart"></canvas>
        </div>
        <p id="trendText" class="trend-text"></p>
      </section>

      <section class="dashboard-card dashboard-history-card">
        <h3>سجل التقييمات</h3>
        <div id="historyList" class="dashboard-history-list"></div>
      </section>

      <section class="dashboard-card dashboard-skills-card">
        <h3>المهارات التي تحتاج متابعة</h3>
        <div id="skillsList" class="skills-list"></div>
      </section>

    </main>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
