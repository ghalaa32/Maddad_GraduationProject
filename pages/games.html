<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | مساحة نمو</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="growth-page-body" onload="loadGamesPage()">

  <div class="growth-shell">

    <header class="growth-topbar">
      <img src="../pictures/logo.png" class="growth-top-logo" alt="شعار مدد" />

      <div class="growth-top-actions">
        <button class="growth-top-icon-btn logout-icon-btn" onclick="logout()" aria-label="تسجيل الخروج">⎋</button>
        <button class="growth-top-icon-btn back-icon-btn" onclick="goBackHome()" aria-label="العودة">←</button>
      </div>
    </header>

    <main class="growth-main-layout">

      <aside class="growth-side-panel">
        <button class="growth-side-item" onclick="goBackHome()">
          <div class="growth-side-icon home-side-icon">⌂</div>
          <span>الرئيسية</span>
        </button>

        <button class="growth-side-item active" onclick="window.location.href='games.html'">
          <div class="growth-side-icon active-side-icon">★</div>
          <span>مساحة نمو</span>
        </button>

        <button class="growth-side-item" onclick="goDashboard()">
          <div class="growth-side-icon outline-side-icon">★</div>
          <span>الأداء</span>
        </button>
      </aside>

      <section class="growth-main-card">
        <div class="growth-card-header">
          <h1 class="growth-title">مساحة نمو</h1>

          <div class="growth-tabs">
            <button class="growth-tab active" onclick="setGrowthFilter('all', this)">الكل</button>
            <button class="growth-tab" onclick="setGrowthFilter('growth', this)">نقاط النمو</button>
            <button class="growth-tab" onclick="setGrowthFilter('games', this)">الألعاب</button>
            <button class="growth-tab" onclick="setGrowthFilter('tips', this)">النصائح</button>
          </div>
        </div>

        <div class="growth-scroll-box">
          <div id="growthItemsGrid" class="growth-items-grid"></div>
        </div>
      </section>

    </main>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
