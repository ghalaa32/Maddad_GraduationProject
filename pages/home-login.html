<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | الرئيسية</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="return-home-body" onload="loadLoginHomePage()">

  <div class="return-home-shell">

    <!-- Top Bar -->
    <header class="return-home-topbar">
      <img src="../pictures/logo.png" class="return-home-top-logo" alt="شعار مدد" />

      <div class="return-topbar-left">
        <button class="return-topbar-icon-btn logout-icon-btn" onclick="logout()" aria-label="تسجيل الخروج"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        <button class="return-topbar-icon-btn settings-icon-btn" onclick="goSettings()" aria-label="الإعدادات">⚙</button>
      </div>
    </header>

    <!-- Main Layout -->
    <main class="return-home-main-layout">

      <!-- Right Side Panel -->
      <aside class="return-side-panel">
        <button class="return-side-item" onclick="goGames()">
          <div class="return-side-icon filled-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/>
  <line x1="15" y1="11" x2="15" y2="11"/><line x1="17" y1="13" x2="17" y2="13"/>
  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" style="display:none"/>
  <rect x="2" y="8" width="20" height="10" rx="4"/>
  <path d="M12 2v6"/>
</svg></div>
          <span>مساحة نمو</span>
        </button>

        <button class="return-side-item" onclick="goDashboard()">
          <div class="return-side-icon outlined-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
  <polyline points="14 2 14 8 20 8"/>
  <line x1="16" y1="13" x2="8" y2="13"/>
  <line x1="16" y1="17" x2="8" y2="17"/>
  <polyline points="10 9 9 9 8 9"/>
</svg></div>
          <span>الأداء</span>
        </button>
      </aside>

      <!-- Main Content -->
      <section class="return-home-main-card">
        <h1 class="return-home-title" id="welcomeTitle">أهلًا ولي أمر</h1>

        <div class="return-home-info-box">
          <div class="return-info-row">
            <span class="return-info-label">اسم الطفل:</span>
            <span class="return-info-value" id="childNameText">-</span>
          </div>

          <div class="return-info-row">
            <span class="return-info-label">العمر:</span>
            <span class="return-info-value" id="childAgeText">-</span>
          </div>

          <div class="return-info-row">
            <span class="return-info-label">الجنس:</span>
            <span class="return-info-value" id="childGenderText">-</span>
          </div>

          <div class="return-info-row">
            <span class="return-info-label">البريد الإلكتروني:</span>
            <span class="return-info-value" id="emailText">-</span>
          </div>
        </div>

        <p class="return-home-text">
          يمكنك من هنا متابعة بيانات طفلك، البدء بإعادة تعبئة الاستبيان، أو الانتقال إلى
          مساحة النمو ولوحة الأداء للاطلاع على الأنشطة والنتائج.
        </p>

        <div class="return-home-btn-wrap">
          <button class="return-home-start-btn" onclick="startQuestionnaire()">
            ابدأ الاستبيان مرة أخرى
          </button>
        </div>
      </section>

    </main>

  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
