<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | أسئلة المتابعة</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="followup-page-body" onload="loadFollowupPage()">

  <div class="followup-shell">

    <!-- Top Bar -->
    <header class="followup-topbar">
      <img src="../pictures/logo.png" alt="شعار مدد" class="followup-top-logo" />

      <div class="followup-top-actions">
        <button class="followup-top-icon-btn logout-icon-btn" onclick="logout()" aria-label="تسجيل الخروج">⎋</button>
        <button class="followup-top-icon-btn back-icon-btn" onclick="window.location.href='result.html'" aria-label="العودة">←</button>
      </div>
    </header>

    <!-- Main -->
    <main class="followup-main-wrap">
      <section class="followup-main-card">

        <h1 class="followup-main-title">أسئلة المتابعة</h1>

        <p class="followup-main-subtitle">
          نحتاج بعض التفاصيل الإضافية لتحسين دقة النتيجة والوصول إلى تقييم أكثر دقة ووضوحًا.
        </p>

        <div id="followupContainer"></div>

      </section>
    </main>

  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
