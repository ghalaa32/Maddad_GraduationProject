<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | الإعدادات</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="settings-page-body" onload="loadSettingsPage()">

  <div class="settings-shell">

    <!-- Top Bar -->
    <header class="settings-topbar">
      <img src="../pictures/logo.png" class="settings-top-logo" alt="شعار مدد"
  onclick="window.location.href='home-login.html'" style="cursor:pointer;" />


      <div class="settings-top-actions">
        <button class="icon-box-btn" onclick="logout()" aria-label="تسجيل الخروج"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        <button class="icon-box-btn" onclick="goBackHome()" aria-label="العودة">←</button>
      </div>
    </header>

    <main class="settings-main-layout">

      <!-- Side Panel -->
      <aside class="settings-side-panel">
        <button class="settings-side-item" onclick="goBackHome()">
          <div class="settings-side-icon home-side-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
          <span>الرئيسية</span>
        </button>

        <button class="settings-side-item" onclick="window.location.href='games.html'">
          <div class="settings-side-icon outline-side-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="20" height="10" rx="4"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="11" x2="15.01" y2="11"/><line x1="17" y1="13" x2="17.01" y2="13"/><path d="M12 2v6"/></svg></div>
          <span>مساحة نمو</span>
        </button>

        <button class="settings-side-item" onclick="goDashboard()">
          <div class="settings-side-icon outline-side-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg></div>
          <span>الأداء</span>
        </button>

        <button class="settings-side-item active" onclick="window.location.href='settings.html'">
          <div class="settings-side-icon active-side-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
          <span>الإعدادات</span>
        </button>
      </aside>

      <!-- Main Card -->
      <section class="settings-main-card">
        <h1 class="settings-title">الإعدادات</h1>

        <div class="settings-info-box">

  <div class="settings-row">
    <span class="settings-label">اسم الطفل</span>
    <span class="settings-value" id="settingsChildName">-</span>
  </div>

  <div class="settings-row">
    <span class="settings-label">البريد الإلكتروني</span>
    <span class="settings-value" id="settingsEmail">-</span>
  </div>

  <div class="settings-row">
    <span class="settings-label">تاريخ إنشاء الحساب</span>
    <span class="settings-value" id="settingsCreated">-</span>
  </div>

  <div class="settings-row">
    <span class="settings-label">عمر الطفل</span>
    <span class="settings-value" id="settingsChildAge">-</span>
  </div>

  <div class="settings-row">
    <span class="settings-label">جنس الطفل</span>
    <span class="settings-value" id="settingsChildGender">-</span>
  </div>

</div>
        <div class="settings-btns-wrap">
          <button class="settings-main-btn" id="editSettingsBtn" onclick="toggleSettingsEdit()">تعديل البيانات</button>
          <button class="settings-secondary-btn" onclick="openAbout()">حول التطبيق</button>
        </div>
      </section>

    </main>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
