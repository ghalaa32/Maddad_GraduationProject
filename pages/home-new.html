<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | الرئيسية</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hn-body {
      min-height: 100vh;
      margin: 0;
      background: #F3F8FF;
      font-family: "Segoe UI", Tahoma, sans-serif;
      overflow-x: hidden;
      position: relative;
    }
    .hn-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .hn-topbar {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 80px;
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid #E3E8F2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      box-sizing: border-box;
      backdrop-filter: blur(8px);
      direction: ltr;
    }
    .hn-topbar img { height: 56px; cursor: pointer; transition: opacity 0.2s; }
    .hn-topbar img:hover { opacity: 0.85; }
    .hn-wrap {
      position: relative;
      z-index: 5;
      max-width: 820px;
      margin: 0 auto;
      padding: 52px 24px 60px;
      text-align: center;
    }
    .hn-card {
      background: rgba(255,255,255,0.88);
      border-radius: 32px;
      padding: 52px 52px 44px;
      box-shadow: 0 16px 48px rgba(60,82,116,0.12);
      backdrop-filter: blur(10px);
      animation: hnFadeUp 0.55s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes hnFadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hn-badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(141,162,201,0.18), rgba(216,168,184,0.18));
      border: 1px solid rgba(141,162,201,0.3);
      color: #5a6e8c;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 30px;
      margin-bottom: 22px;
    }
    .hn-title { font-size: 36px; font-weight: 800; color: #1F1F27; line-height: 1.5; margin: 0 0 16px; }
    .hn-title span { color: #5a6e8c; }
    .hn-text { font-size: 17px; line-height: 2; color: #5a6478; max-width: 580px; margin: 0 auto 36px; }
    .hn-pills { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 36px; }
    .hn-pill {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.9);
      border: 1.5px solid rgba(141,162,201,0.22);
      border-radius: 30px; padding: 9px 18px;
      font-size: 14px; font-weight: 600; color: #3c5274;
      box-shadow: 0 4px 12px rgba(60,82,116,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hn-pill:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(60,82,116,0.12); }
    .hn-pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .hn-btn {
      min-width: 240px; height: 60px; border: none; border-radius: 999px;
      background: #3c5274; color: #fff; font-size: 18px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 10px 26px rgba(60,82,116,0.28);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hn-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(60,82,116,0.32); }
    .hn-note { font-size: 13px; color: #aab5c8; margin-top: 18px; }
    @media (max-width: 600px) {
      .hn-card { padding: 32px 22px; }
      .hn-title { font-size: 26px; }
      .hn-text { font-size: 15px; }
    }
  </style>
</head>
<body class="hn-body" onload="checkHomeNewAccess()">

  <div class="hn-bg">
    <svg width="100%" height="100%" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="pz" d="M0,0 L60,0 Q60,0 65,-8 Q75,-20 85,-8 Q90,0 100,0 L100,60 Q100,60 108,65 Q120,75 108,85 Q100,90 100,100 L0,100 L0,40 Q0,40 -8,35 Q-20,25 -8,15 Q0,10 0,0 Z"/>
      </defs>
      <g opacity="0.13" transform="translate(1080,40) rotate(15)"><use href="#pz" fill="#8da2c9" transform="scale(1.4)"/></g>
      <g opacity="0.10" transform="translate(1220,120) rotate(-10)"><use href="#pz" fill="#d8a8b8" transform="scale(1.1)"/></g>
      <g opacity="0.09" transform="translate(1160,220) rotate(30)"><use href="#pz" fill="#8da2c9" transform="scale(0.9)"/></g>
      <g opacity="0.11" transform="translate(-30,650) rotate(-20)"><use href="#pz" fill="#d8a8b8" transform="scale(1.5)"/></g>
      <g opacity="0.09" transform="translate(100,720) rotate(10)"><use href="#pz" fill="#8da2c9" transform="scale(1.2)"/></g>
      <g opacity="0.08" transform="translate(60,560) rotate(40)"><use href="#pz" fill="#c4b5d8" transform="scale(0.85)"/></g>
      <g opacity="0.07" transform="translate(-20,80) rotate(5)"><use href="#pz" fill="#8da2c9" transform="scale(1.0)"/></g>
      <g opacity="0.08" transform="translate(1280,700) rotate(-25)"><use href="#pz" fill="#d8a8b8" transform="scale(1.3)"/></g>
      <g opacity="0.07" transform="translate(1350,580) rotate(15)"><use href="#pz" fill="#8da2c9" transform="scale(0.95)"/></g>
      <circle cx="200" cy="200" r="5" fill="#8da2c9" opacity="0.18"/>
      <circle cx="350" cy="780" r="4" fill="#d8a8b8" opacity="0.16"/>
      <circle cx="1100" cy="400" r="6" fill="#8da2c9" opacity="0.14"/>
      <circle cx="1300" cy="300" r="4" fill="#d8a8b8" opacity="0.15"/>
      <circle cx="700" cy="50" r="5" fill="#c4b5d8" opacity="0.13"/>
      <circle cx="80" cy="400" r="4" fill="#8da2c9" opacity="0.12"/>
      <ellipse cx="1300" cy="0" rx="260" ry="240" fill="rgba(141,162,201,0.13)"/>
      <ellipse cx="0" cy="900" rx="240" ry="220" fill="rgba(216,168,184,0.11)"/>
    </svg>
  </div>

  <header class="hn-topbar">
    <button class="icon-box-btn" onclick="logout()" aria-label="تسجيل الخروج">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
    <img src="../pictures/logo.png" alt="شعار مدد" onclick="window.location.href='home-new.html'" />
  </header>

  <div class="hn-wrap">
    <div class="hn-card">
      <div class="hn-badge">منصة الكشف المبكر</div>
      <h1 class="hn-title">
        استبيان الفحص المبكر<br>
        <span>لاضطراب طيف التوحد</span>
      </h1>
      <p class="hn-text">
        هذا الاستبيان مخصص للمساعدة في تقييم بعض سلوكيات الطفل
        وذلك بهدف الكشف المبكر عن احتمالية وجود مؤشرات مرتبطة باضطراب طيف التوحد.
      </p>
      <div class="hn-pills">
        <div class="hn-pill"><div class="hn-pill-dot" style="background:#8da2c9;"></div>استبيان دقيق</div>
        <div class="hn-pill"><div class="hn-pill-dot" style="background:#d8a8b8;"></div>ألعاب تفاعلية</div>
        <div class="hn-pill"><div class="hn-pill-dot" style="background:#b0a8c9;"></div>متابعة الأداء</div>
      </div>
      <button class="hn-btn" onclick="startQuestionnaire()">ابدأ الاستبيان الآن</button>
      <p class="hn-note">هذه الأداة للفحص المبكر فقط وليست تشخيصًا طبياً</p>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
