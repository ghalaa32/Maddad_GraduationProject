<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | طلبات الإذن</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="growth-page-body" onload="loadPermissionsPage()">
  <div class="growth-shell">
    <header class="growth-topbar">
      <img src="../pictures/logo.png" class="growth-top-logo" alt="شعار مدد"
        onclick="window.location.href='home-login.html'" style="cursor:pointer;" />
      <div class="growth-top-actions">
        <button class="icon-box-btn" onclick="logout()" aria-label="تسجيل الخروج">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="growth-main-layout">
      <aside class="growth-side-panel">
        <button class="growth-side-item" onclick="goBackHome()">
          <div class="growth-side-icon home-side-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
          <span>الرئيسية</span>
        </button>
        <button class="growth-side-item" onclick="window.location.href='games.html'">
          <div class="growth-side-icon outline-side-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="20" height="10" rx="4"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="11" x2="15.01" y2="11"/><line x1="17" y1="13" x2="17.01" y2="13"/><path d="M12 2v6"/></svg></div>
          <span>مساحة نمو</span>
        </button>
        <button class="growth-side-item active" onclick="window.location.href='permissions.html'">
          <div class="growth-side-icon active-side-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1V7A5 5 0 0 0 7 7v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2z"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg></div>
          <span>طلبات الإذن</span>
        </button>
        <button class="growth-side-item" onclick="goDashboard()">
          <div class="growth-side-icon outline-side-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg></div>
          <span>الأداء</span>
        </button>
      </aside>

      <section class="growth-main-card">
        <div class="growth-card-header">
          <h1 class="growth-title">طلبات الإذن</h1>
        </div>
        <div class="growth-scroll-box">
          <div id="permissionsContainer" style="display:flex; flex-direction:column; gap:12px;"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
