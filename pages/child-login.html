<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | دخول الطفل</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="child-login-body">

  <div class="child-login-shell">

    <header class="child-login-topbar">
      <img src="../pictures/logo.png" class="child-login-logo" alt="شعار مدد" />
      <button class="child-login-back-btn" onclick="goBackIndex()" aria-label="العودة">←</button>
    </header>

    <main class="child-login-main">
      <div class="child-login-card">

        <h1 class="child-login-title">تسجيل دخول الطفل</h1>

        <p class="child-login-text">
          ادخل البريد الإلكتروني وكلمة المرور الخاصة بولي الأمر
        </p>

        <div class="child-login-form">
          <input
            type="email"
            id="childLoginEmail"
            placeholder="البريد الإلكتروني"
            class="child-login-input"
            oninput="validatePassword(this, 'childPasswordError', false)"
          />
          <span class="field-error" id="childEmailError"></span>

          <input
            type="password"
            id="childLoginPassword"
            placeholder="كلمة المرور"
            class="child-login-input"
            oninput="validatePassword(this, 'childPasswordError')"
          />
          <span class="field-error" id="childPasswordError"></span>

          <button class="child-login-btn" onclick="submitChildLogin()">
            الدخول إلى الألعاب
          </button>
        </div>

      </div>
    </main>

  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
